name: DevSecOps Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: read
  actions: read

jobs:

  # ─────────────────────────────────────────
  # Stage 1 — Build & Test
  # ─────────────────────────────────────────
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

  # ─────────────────────────────────────────
  # Stage 2 — SonarCloud (SAST)
  # ─────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Build and Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"VSMANOJKUMAR_dotnet-taskapi" \
            /o:"vsmanojkumar" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          dotnet build
          dotnet-sonarscanner end \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  # ─────────────────────────────────────────
  # Stage 3 — Trivy Filesystem Scan
  # ─────────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs: sonarcloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-fs-report.txt'

      - name: Upload Trivy FS report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  # ─────────────────────────────────────────
  # Stage 4 — OWASP Dependency Check (SCA)
  # ─────────────────────────────────────────
  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: trivy-fs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'dotnet-taskapi'
          path: '.'
          format: 'HTML'
          out: 'reports'

      - name: Upload OWASP report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/

  # ─────────────────────────────────────────
  # Stage 5 — Docker Build + Trivy Image Scan
  # ─────────────────────────────────────────
  docker-build-scan:
    name: Docker Build and Image Scan
    runs-on: ubuntu-latest
    needs: owasp
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/dotnet-taskapi:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/dotnet-taskapi:${{ github.sha }} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/dotnet-taskapi:latest

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/dotnet-taskapi:${{ github.sha }}'
          format: 'table'
          output: 'trivy-image-report.txt'

      - name: Upload Trivy image report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt

  # ─────────────────────────────────────────
  # Stage 6 — Docker Push
  # ─────────────────────────────────────────
  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dotnet-taskapi:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dotnet-taskapi:${{ github.sha }}
```

---

## What Changed
```
Before → Trivy uploaded SARIF to GitHub Security tab (needed permissions)
After  → Trivy saves a simple .txt report as a downloadable artifact

Same security scanning, zero permission issues
```

---

## Where to Find Reports After Pipeline Runs
```
GitHub → Actions tab → click your pipeline run
→ scroll down to "Artifacts" section

You'll see:
📄 trivy-fs-report      ← filesystem scan results
📄 trivy-image-report   ← container image scan results
📄 owasp-report         ← dependency CVE report